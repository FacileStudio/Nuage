services:
  nuage-db:
    container_name: nuage-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nuage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuage-internal-db}
      POSTGRES_DB: ${POSTGRES_DB:-nuage}
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuage"]
      interval: 5s
      timeout: 5s
      retries: 10

  nuage-minio:
    container_name: nuage-minio
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-nuage-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-nuage-internal-storage}
    volumes:
      - storage_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "9000"
      - "9001"

  nuage-api:
    container_name: nuage-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    expose:
      - "4000"
    networks:
      - default
      - dokploy-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: dokploy-network
      traefik.http.routers.nuage-api-web.rule: "Host(`nuage.facile.studio`) && PathPrefix(`/api`)"
      traefik.http.routers.nuage-api-web.entrypoints: web
      traefik.http.routers.nuage-api-web.middlewares: redirect-to-https@file
      traefik.http.routers.nuage-api-web.service: nuage-api-svc
      traefik.http.routers.nuage-api-secure.rule: "Host(`nuage.facile.studio`) && PathPrefix(`/api`)"
      traefik.http.routers.nuage-api-secure.entrypoints: websecure
      traefik.http.routers.nuage-api-secure.tls.certresolver: letsencrypt
      traefik.http.routers.nuage-api-secure.middlewares: nuage-strip-api
      traefik.http.routers.nuage-api-secure.service: nuage-api-svc
      traefik.http.routers.nuage-webdav-web.rule: "Host(`nuage.facile.studio`) && PathPrefix(`/webdav`)"
      traefik.http.routers.nuage-webdav-web.entrypoints: web
      traefik.http.routers.nuage-webdav-web.middlewares: redirect-to-https@file
      traefik.http.routers.nuage-webdav-web.service: nuage-api-svc
      traefik.http.routers.nuage-webdav-secure.rule: "Host(`nuage.facile.studio`) && PathPrefix(`/webdav`)"
      traefik.http.routers.nuage-webdav-secure.entrypoints: websecure
      traefik.http.routers.nuage-webdav-secure.tls.certresolver: letsencrypt
      traefik.http.routers.nuage-webdav-secure.service: nuage-api-svc
      traefik.http.middlewares.nuage-strip-api.stripprefix.prefixes: /api
      traefik.http.services.nuage-api-svc.loadbalancer.server.port: "4000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nuage}:${POSTGRES_PASSWORD:-nuage-internal-db}@nuage-db:5432/${POSTGRES_DB:-nuage}?sslmode=disable
      PORT: "4000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORAGE_DIR: /app/data
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SUCCESS_URL: ${OIDC_SUCCESS_URL:-}
      SSO_ONLY: ${SSO_ONLY:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      MINIO_ENDPOINT: nuage-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-nuage-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-nuage-internal-storage}
      MINIO_BUCKET: nuage
      MINIO_USE_SSL: "false"
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      nuage-db:
        condition: service_healthy
      nuage-minio:
        condition: service_healthy

  nuage-client:
    container_name: nuage-client
    build:
      context: apps/client
      dockerfile: Dockerfile
      network: host
    expose:
      - "3000"
    environment:
      API_URL: http://nuage-api:4000
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      BODY_SIZE_LIMIT: Infinity
    depends_on:
      nuage-api:
        condition: service_healthy

networks:
  dokploy-network:
    external: true

volumes:
  db_data:
    name: nuage_db_data
  storage_data:
    name: nuage_storage_data
  api_data:
    name: nuage_api_data
