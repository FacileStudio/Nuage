services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nuage}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - storage_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "9000"
      - "9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    expose:
      - "4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/nuage?sslmode=disable}
      PORT: ${PORT:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DOMAINS: ${DOMAINS:-http://localhost:3000,http://127.0.0.1:3000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SUCCESS_URL: ${OIDC_SUCCESS_URL:-}
      SSO_ONLY: ${SSO_ONLY:-false}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-nuage}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  client:
    build:
      context: apps/client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:4000}
      network: host
    expose:
      - "80"
    depends_on:
      - api

volumes:
  db_data:
    name: nuage_db_data
  storage_data:
    name: nuage_storage_data
